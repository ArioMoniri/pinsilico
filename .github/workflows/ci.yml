name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel duplicate runs on the same ref — saves Actions minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required permission baseline. No write needed for CI; release.yml requests
# its own permissions when it lands in Phase 12.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"
  PNPM_VERSION: "9"

jobs:
  # ============================================================== lint
  # One platform suffices for lint (linters are deterministic across OSes);
  # ubuntu is fastest and cheapest. Test jobs run the full 3-OS matrix.
  lint:
    name: Lint (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install sidecar dev deps
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: ruff check
        working-directory: sidecar
        run: ruff check .

      - name: ruff format --check
        working-directory: sidecar
        run: ruff format --check .

      - name: mypy --strict
        working-directory: sidecar
        run: mypy

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install frontend deps
        run: pnpm install --no-frozen-lockfile

      - name: prettier --check
        working-directory: app
        run: pnpm format:check

      - name: eslint --max-warnings 0
        working-directory: app
        run: pnpm lint

      - name: tsc --noEmit
        working-directory: app
        run: pnpm typecheck

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: cargo fmt --check
        working-directory: app/src-tauri
        run: cargo fmt --check

      - name: cargo clippy --all-targets -- -D warnings
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  # ============================================================== test-python
  test-python:
    name: Test (Python) · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install sidecar dev deps
        working-directory: sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: pytest with coverage gate
        working-directory: sidecar
        shell: bash
        run: pytest

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: sidecar/coverage.xml
          retention-days: 14

  # ============================================================== test-frontend
  test-frontend:
    name: Test (Frontend) · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install frontend deps
        run: pnpm install --no-frozen-lockfile

      - name: vitest run
        working-directory: app
        run: pnpm test

  # ============================================================== test-rust
  test-rust:
    name: Test (Rust) · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: cargo-test-${{ runner.os }}-

      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Placeholder sidecar binary (so Tauri build script passes)
        shell: bash
        # tauri.conf.json declares `externalBin: binaries/pinsilico-sidecar`,
        # which causes the tauri-build crate to refuse to compile unless the
        # per-platform binary exists at build time. The rust smoke tests
        # don't actually exec the sidecar — they cover pure helpers in
        # lib.rs and sidecar.rs — so a zero-byte placeholder is enough.
        # release.yml builds the real PyInstaller binary instead.
        run: |
          mkdir -p app/src-tauri/binaries
          case "${{ matrix.os }}" in
            ubuntu-latest)  triple="x86_64-unknown-linux-gnu" ; ext="" ;;
            macos-14)       triple="aarch64-apple-darwin"      ; ext="" ;;
            windows-latest) triple="x86_64-pc-windows-msvc"    ; ext=".exe" ;;
          esac
          touch "app/src-tauri/binaries/pinsilico-sidecar-${triple}${ext}"
          chmod +x "app/src-tauri/binaries/pinsilico-sidecar-${triple}${ext}" || true
          ls -la app/src-tauri/binaries/

      - name: cargo test --all-targets
        working-directory: app/src-tauri
        run: cargo test --all-targets
