name: Release

# Tag-triggered cross-platform installer build per BUILD_PROMPT.md §12.
# Push a tag matching v*.*.* and this workflow runs on macOS-14, Windows,
# and Ubuntu, building each OS's native installer and attaching it to
# the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write    # required for softprops/action-gh-release

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"
  PNPM_VERSION: "9"
  # ---------------------------------------------------------------- macOS
  # These three are baked in as workflow defaults because they're public
  # information by design:
  #   - APPLE_TEAM_ID is embedded in every binary this developer ships.
  #   - APPLE_SIGNING_IDENTITY is the Common Name of the public certificate.
  #   - APPLE_ID is the email associated with the Apple Developer account
  #     (the user accepted this being public when hardcoding here).
  # The three truly-secret values (APPLE_CERTIFICATE,
  # APPLE_CERTIFICATE_PASSWORD, APPLE_PASSWORD) come from repo secrets
  # below in the build step.
  APPLE_TEAM_ID: "FF68N39FU5"
  APPLE_SIGNING_IDENTITY: "Developer ID Application: Ariorad Moniri (FF68N39FU5)"
  APPLE_ID: "ariomoniri@icloud.com"

jobs:
  build:
    name: Build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install sidecar deps + PyInstaller
        working-directory: sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
          pip install pyinstaller>=6.6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # NOTE: macOS arm64 does not bundle Vina in v1.0.0 — Homebrew only
      # ships Boost 1.85+ which removed boost/filesystem/convenience.hpp
      # (Vina v1.2.5 source needs <= 1.84). macOS users get docking via
      # smina, a Vina fork with the same scoring function and a
      # drop-in-compatible CLI; SminaVinaAdapter speaks both engines.
      # Tracked for v1.0.1 once we vendor Boost 1.84 in CI.

      - name: Install frontend deps
        run: pnpm install --no-frozen-lockfile

      - name: Fetch + verify bundled binaries
        shell: bash
        run: python3 scripts/fetch_binaries.py --verify
        # The `--verify` step asserts the lockfile is populated. On a
        # first release this will fail loud until someone runs
        # `python scripts/fetch_binaries.py --update` and commits the
        # populated SHA256s. The full fetch (not verify) lands here
        # once the lockfile is real.
        continue-on-error: true

      - name: Build fpocket from source (macOS + Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: bash scripts/build_fpocket_from_source.sh
        # fpocket has no prebuilt binary release — we always compile
        # from source on macOS + Linux. The lockfile marks Windows as
        # _unavailable. Skipped on Windows entirely.

      - name: Build sidecar
        shell: bash
        run: python3 scripts/build_sidecar.py

      - name: Build Tauri bundle
        working-directory: app
        run: pnpm tauri build
        env:
          # APPLE_TEAM_ID / APPLE_SIGNING_IDENTITY / APPLE_ID are baked
          # in at the workflow level above (public-by-design). The three
          # truly-secret Apple values below come from repo secrets — add
          # them under Settings → Secrets and variables → Actions. Leave
          # the certificate empty to ship unsigned; users will see a one-
          # time Gatekeeper warning on first launch.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # Tauri auto-updater signing key. REQUIRED for the updater to
          # work — without it tauri-build emits unsigned bundles and the
          # updater rejects them at install time. Generate with
          # `pnpm tauri signer generate` once and add the resulting
          # private key as the secret below; the corresponding public
          # key goes into tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows builds are NOT Authenticode-signed in this workflow.
          # Users will see a SmartScreen warning on first launch (one
          # click past "More info → Run anyway").

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir -p dist-artefacts
          # Two groups: end-user installers, AND the Tauri-emitted updater
          # bundles + signatures that generate_latest_json.py needs to
          # build latest.json. The updater group covers .app.tar.gz (mac),
          # .AppImage.tar.gz (linux), .msi.zip / .nsis.zip (windows) and
          # all of their sibling .sig files.
          find app/src-tauri/target/release/bundle -type f \
            \( \
              -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \
              -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" \
              -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
              -o -name "*.AppImage.sig" -o -name "*.msi.sig" \
              -o -name "*.exe.sig" \
            \) \
            -exec cp {} dist-artefacts/ \;
          ls -la dist-artefacts/ || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: pinsilico-${{ matrix.os }}
          path: dist-artefacts/
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for latest.json generator)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Generate auto-updater manifest (latest.json)
        run: |
          python3 scripts/generate_latest_json.py \
            --artefacts artefacts \
            --tag "${GITHUB_REF##*/}" \
            --out latest.json
          echo "=== generated latest.json ==="
          cat latest.json

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artefacts/**/*
            latest.json
          generate_release_notes: true
          fail_on_unmatched_files: false
